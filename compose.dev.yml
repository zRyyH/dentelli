services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Synchronized File Shares (Docker Desktop >= 4.27) — muito mais rápido que bind mount
      - type: bind
        source: .
        target: /app
        consistency: cached   # leituras do container usam cache local
      # Preserva node_modules e .next do container (não sincroniza com host)
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
    restart: unless-stopped
