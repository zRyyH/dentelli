services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Monta o source para hot reload
      - .:/app
      # Preserva node_modules e .next do container
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true     # força polling no Windows/WSL
      - CHOKIDAR_USEPOLLING=true   # fallback para watchers legados
      - CHOKIDAR_INTERVAL=300      # checar mudanças a cada 300ms
    restart: unless-stopped
